<html>

<head>
    <title>SLC Fall 2021</title>
    <link rel="stylesheet" href="./css/slc.css">
    <script src="./js/slc.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rowdies&display=swap" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<body class="slides">
    <div>
        <h1>Adult Life</h1>
        <div class="slideshow">

            <div class="slide" id="slide1">
                <img class="slide-image" src="./css/img/Driving1.jpg">
                <div class="slide-text"> Driving </div>
                <div class="slide-text-small"> 
                    <ul>
                        <li>Have my drivers license</li>
                        <li>Learning stick shift</li>
                      </ul>
                </div>

            </div>

            <div class="slide" id="slide2">
                <img class="slide-image" src="./css/img/financial.jpg">
                <div class="slide-text"> Financial Independance </div>
                <div class="slide-text-small"> 
                    <ul>
                        <li>Cat sitting</li>
                        <li>Orange Picking</li>
                        <li>Cinnamon Swirl</li>
                      </ul>
                </div>
            </div>

            <div class="slide" id="slide3">
                <img class="slide-image" src="./css/img/planner.jpg">
                <div class="slide-text"> Planner </div>
                <div class="slide-text-small"> 
                    <ul>
                        <li>Very useful tool</li>
                        <li>Lets me keep on top of everything</li>
                      </ul>
                </div>
            </div>

            <img src="./css/img/caret.png" class="icon" id="next-icon">
            <img src="./css/img/caret.png" class="icon" id="prev-icon">

        </div>

        <div class="links">
            <button class="link"> 1 </button>
            <button class="link"> 2 </button>
            <button class="link"> 3 </button>
        </div>

        <script>
            var currentSlide = 1;
            var slides = $(".slide");

            function changeSlide() {
                slides.css("opacity", 0)
                $("#slide" + currentSlide).css("opacity", 1)
            }

            changeSlide();

            function next() {
                if (currentSlide == slides.length) {
                    currentSlide = 1;
                }
                else {
                    currentSlide += 1;
                }
                changeSlide();

                $(".link").removeClass("active");
            }

            function prev() {
                if (currentSlide == 1) {
                    currentSlide = slides.length;
                }
                else {
                    currentSlide -= 1;
                }

                changeSlide();

                $(".link").removeClass("active");
            }

            function goto(param) {
                var clicked = param.currentTarget;
                currentSlide = parseInt($(clicked).text());
                //console.log("current slide", currentSlide);
                changeSlide();

                $(".link").removeClass("active");
                $(this).addClass("active");
            }



            $("#next-icon").click(next);
            $("#prev-icon").click(prev);
            $(".link").click(goto);

        </script>
    </div>
</body>

</html>
