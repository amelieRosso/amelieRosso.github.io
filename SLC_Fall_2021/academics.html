        <div class="links">
            <button class="link"> 1 </button>

            <button class="link"> 5 </button>
            <button class="link"> 6 </button>
        </div>

        <script>
            var currentSlide = 1;
            var slides = $(".slide");

            function changeSlide() {
                slides.css("opacity", 0)
                $("#slide" + currentSlide).css("opacity", 1)
            }

            changeSlide();

            function next() {
                if (currentSlide == slides.length) {
                    currentSlide = 1;
                }
                else {
                    currentSlide += 1;
                }
                changeSlide();

                $(".link").removeClass("active");
            }

            function prev() {
                if (currentSlide == 1) {
                    currentSlide = slides.length;
                }
                else {
                    currentSlide -= 1;
                }

                changeSlide();

                $(".link").removeClass("active");
            }

            function goto(param) {
                var clicked = param.currentTarget;
                currentSlide = parseInt($(clicked).text());
                //console.log("current slide", currentSlide);
                changeSlide();

                $(".link").removeClass("active");
                $(this).addClass("active");
            }



            $("#next-icon").click(next);
            $("#prev-icon").click(prev);
            $(".link").click(goto);

        </script>
